services:
  - type: web
    name: certportal-api
    runtime: node
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATA_DIR
        value: /tmp/data
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
